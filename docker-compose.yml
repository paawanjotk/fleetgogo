version: "3.8"

services:
  driver:
    build: ./driver
    restart: unless-stopped
    ports:
      - "3001:3001"
    env_file:
      - ./driver/.env
    environment:
      - RABBITMQ_URL=${RABBITMQ_URL:-amqp://rabbitmq:5672}
      - SERVICE_NAME=driver
      - OTEL_EXPORTER_OTLP_ENDPOINT=${OTEL_EXPORTER_OTLP_ENDPOINT:-http://otel-collector:4318/v1/traces}
    depends_on:
      - mongo
      - redis
      - rabbitmq
      - otel-collector
    networks:
      - fleet_network
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:3001/health"]
      interval: 15s
      timeout: 5s
      retries: 3
      start_period: 20s

  vehicle:
    build: ./vehicle
    restart: unless-stopped
    ports:
      - "3002:3002"
    env_file:
      - ./vehicle/.env
    environment:
      - RABBITMQ_URL=${RABBITMQ_URL:-amqp://rabbitmq:5672}
      - SERVICE_NAME=vehicle
      - OTEL_EXPORTER_OTLP_ENDPOINT=${OTEL_EXPORTER_OTLP_ENDPOINT:-http://otel-collector:4318/v1/traces}
    depends_on:
      - mongo
      - redis
      - rabbitmq
      - otel-collector
    networks:
      - fleet_network
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:3002/health"]
      interval: 15s
      timeout: 5s
      retries: 3
      start_period: 20s

  trips:
    build: ./trips
    restart: unless-stopped
    ports:
      - "3003:3003"
    env_file:
      - ./trips/.env
    environment:
      - RABBITMQ_URL=${RABBITMQ_URL:-amqp://rabbitmq:5672}
      - DRIVERS_SERVICE_URL=${DRIVERS_SERVICE_URL:-http://driver:3001}
      - VEHICLES_SERVICE_URL=${VEHICLES_SERVICE_URL:-http://vehicle:3002}
      - SERVICE_NAME=trips
      - OTEL_EXPORTER_OTLP_ENDPOINT=${OTEL_EXPORTER_OTLP_ENDPOINT:-http://otel-collector:4318/v1/traces}
    depends_on:
      - mongo
      - redis
      - rabbitmq
      - otel-collector
    networks:
      - fleet_network
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:3003/health"]
      interval: 15s
      timeout: 5s
      retries: 3
      start_period: 20s

  gatewaygraphql:
    build: ./gatewaygraphql
    restart: unless-stopped
    ports:
      - "4000:4000"
    env_file:
      - ./gatewaygraphql/.env
    environment:
      - OTEL_EXPORTER_OTLP_ENDPOINT=${OTEL_EXPORTER_OTLP_ENDPOINT:-http://otel-collector:4318/v1/traces}
      - SERVICE_NAME=gatewaygraphql
    depends_on:
      driver:
        condition: service_healthy
      vehicle:
        condition: service_healthy
      trips:
        condition: service_healthy
      otel-collector:
        condition: service_started
    networks:
      - fleet_network
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:4000/health"]
      interval: 15s
      timeout: 5s
      retries: 3
      start_period: 30s

  mongo:
    image: mongo:6.0
    container_name: mongodb
    restart: always
    ports:
      - "27017:27017"
    volumes:
      - mongo_data:/data/db
    networks:
      - fleet_network

  redis:
    image: redis:latest
    container_name: redis
    restart: always
    ports:
      - "6379:6379"
    networks:
      - fleet_network

  rabbitmq:
    image: rabbitmq:3-management
    container_name: rabbitmq
    restart: always
    ports:
      - "5672:5672"
      - "15672:15672"
    networks:
      - fleet_network

  otel-collector:
    image: otel/opentelemetry-collector-contrib:latest
    command: ["--config=/etc/otel/config.yaml"]
    volumes:
      - ./otel-collector-config.yaml:/etc/otel/config.yaml:ro
    ports:
      - "4317:4317" # OTLP gRPC
      - "4318:4318" # OTLP HTTP
    depends_on:
      - jaeger
    networks:
      - fleet_network

  jaeger:
    image: jaegertracing/all-in-one:latest
    environment:
      - COLLECTOR_OTLP_ENABLED=true
    ports:
      - "16686:16686" # Jaeger UI
      - "4317:4317"   # OTLP gRPC (collector)
    networks:
      - fleet_network

networks:
  fleet_network:

volumes:
  mongo_data:
